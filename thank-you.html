<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تم استلام طلبك | شكراً لك</title>
    <meta name="description" content="تم استلام طلبك بنجاح. سيتم التواصل معك قريباً لتأكيد الطلب." />
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Cairo", system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        padding: 24px;
      }
      .card {
        width: min(680px, 100%);
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        padding: 28px 22px;
        text-align: center;
      }
      .badge {
        display: inline-block;
        background: #dcfce7;
        color: #166534;
        font-weight: 700;
        border-radius: 999px;
        padding: 6px 14px;
        font-size: 14px;
        margin-bottom: 12px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(24px, 4vw, 34px);
      }
      p {
        margin: 0;
        color: #334155;
        line-height: 1.8;
        font-size: 17px;
      }
      .actions {
        margin-top: 20px;
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .btn {
        border: 0;
        text-decoration: none;
        border-radius: 10px;
        padding: 12px 18px;
        font-weight: 700;
        font-size: 15px;
      }
      .btn-primary {
        background: #dc2626;
        color: #fff;
      }
      .btn-secondary {
        background: #e2e8f0;
        color: #0f172a;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="badge">تم بنجاح</span>
      <h1>شكراً! تم استلام طلبك</h1>
      <p>
        سيتم التواصل معك قريباً لتأكيد تفاصيل الطلب والتوصيل.
        <br />
        إذا لم تكتمل محادثة واتساب، يمكنك إعادة فتحها من الزر التالي.
      </p>
      <div class="actions">
        <a class="btn btn-primary" href="https://wa.me/212782385513" target="_blank" rel="noopener noreferrer">فتح واتساب</a>
        <a class="btn btn-secondary" href="/">العودة للصفحة الرئيسية</a>
      </div>
    </main>
  </body>
</html>
